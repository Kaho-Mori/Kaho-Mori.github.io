{{ range $name, $pages := .Page.Site.Taxonomies.tags }}
  {{ $blog_count := 0 }}
  {{ range $pages }}
    {{ if eq .Section "blog" }}
      {{ $blog_count = add $blog_count 1 }}
    {{ end }}
  {{ end }}
  {{ if gt $blog_count 0 }}
<a href="/tags/{{ $name | urlize }}/"
   class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium bg-primary-100 dark:bg-primary-900 text-primary-700 dark:text-primary-300 hover:bg-primary-200 dark:hover:bg-primary-800 transition mr-2 mb-2">
  {{ $name }}<span class="text-xs opacity-60 ml-1">{{ $blog_count }}</span>
</a>
  {{ end }}
{{ end }}
