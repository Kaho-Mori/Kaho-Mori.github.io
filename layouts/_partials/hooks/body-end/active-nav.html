<script>
(function() {
  // Active nav highlight
  var path = window.location.pathname;
  document.querySelectorAll('nav a').forEach(function(a) {
    var href = a.getAttribute('href');
    if (!href || href === '/') return;
    if (path === href || path.startsWith(href)) {
      a.classList.add('nav-active');
    }
  });

  // Move tags div (containing /tags/ links) to just after h1
  document.querySelectorAll('div.flex.justify-center').forEach(function(div) {
    if (div.querySelector('a[href^="/tags/"]')) {
      var h1 = document.querySelector('h1');
      if (h1 && h1.parentNode) {
        h1.parentNode.insertBefore(div, h1.nextSibling);
      }
    }
  });

  // Add caption below profile avatar
  var avatar = document.querySelector('.author-avatar img, .avatar img, [class*="avatar"] img');
  if (avatar) {
    var caption = document.createElement('p');
    caption.textContent = 'ISME19 @ Cape Town';
    caption.style.cssText = 'text-align:center;font-size:0.75rem;color:#6b7280;margin-top:0.25rem;';
    avatar.parentNode.insertAdjacentElement('afterend', caption);
  }
  if (window.location.pathname === '/') {
    var LIGHT_BG = null;
    var DARK_BG = '/media/bg_dark.jpg';
    function updateHeroBg() {
      var el = document.querySelector('.home-section-bg');
      if (!el) return;
      var isDark = document.documentElement.classList.contains('dark');
      if (!LIGHT_BG) { LIGHT_BG = el.style.backgroundImage; }
      el.style.backgroundImage = isDark ? 'url(' + DARK_BG + ')' : LIGHT_BG;
    }
    updateHeroBg();
    new MutationObserver(updateHeroBg).observe(document.documentElement, { attributeFilter: ['class'] });
  }
})();
</script>
